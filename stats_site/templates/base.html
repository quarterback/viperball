<!DOCTYPE html>
<html lang="en" data-theme="bloomberg">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Viperball Stats{% endblock %}</title>
<style>
/* Bloomberg (default dark) */
:root, [data-theme="bloomberg"] {
  --bg: #0a0a0a;
  --bg-alt: #111;
  --fg: #c8c8c8;
  --fg-dim: #666;
  --fg-bright: #eee;
  --accent: #ff6600;
  --accent-dim: #cc5200;
  --green: #33cc33;
  --red: #cc3333;
  --yellow: #cccc33;
  --blue: #3399ff;
  --cyan: #33cccc;
  --border: #222;
  --row-hover: #1a1a1a;
}
/* Light */
[data-theme="light"] {
  --bg: #f5f5f0;
  --bg-alt: #eaeae5;
  --fg: #3c3c3c;
  --fg-dim: #888;
  --fg-bright: #1a1a1a;
  --accent: #b45309;
  --accent-dim: #92400e;
  --green: #16a34a;
  --red: #dc2626;
  --yellow: #a16207;
  --blue: #2563eb;
  --cyan: #0891b2;
  --border: #d4d4cc;
  --row-hover: #e8e8e0;
}
/* Ocean Dark — based on the Atlantis/ocean terminal palette */
[data-theme="ocean"] {
  --bg: #0c1014;
  --bg-alt: #11151c;
  --fg: #99d1ce;
  --fg-dim: #245361;
  --fg-bright: #d3ebe9;
  --accent: #d26937;
  --accent-dim: #c23127;
  --green: #2aa889;
  --red: #c23127;
  --yellow: #edb443;
  --blue: #195466;
  --cyan: #33859e;
  --border: #091f2e;
  --row-hover: #0a3749;
}
/* Ocean Light — light variant of the ocean palette */
[data-theme="ocean-light"] {
  --bg: #d3ebe9;
  --bg-alt: #c4dbd9;
  --fg: #0c1014;
  --fg-dim: #245361;
  --fg-bright: #091f2e;
  --accent: #d26937;
  --accent-dim: #c23127;
  --green: #2aa889;
  --red: #c23127;
  --yellow: #a16207;
  --blue: #195466;
  --cyan: #33859e;
  --border: #99d1ce;
  --row-hover: #b8dad7;
}
/* Amber — retro CRT terminal */
[data-theme="amber"] {
  --bg: #0a0800;
  --bg-alt: #141000;
  --fg: #cc9a00;
  --fg-dim: #665000;
  --fg-bright: #ffbf00;
  --accent: #ffbf00;
  --accent-dim: #cc9a00;
  --green: #ccaa00;
  --red: #ff6600;
  --yellow: #ffbf00;
  --blue: #cc9a00;
  --cyan: #cc9a00;
  --border: #332800;
  --row-hover: #1a1400;
}
/* Solarized Dark */
[data-theme="solarized"] {
  --bg: #002b36;
  --bg-alt: #073642;
  --fg: #839496;
  --fg-dim: #586e75;
  --fg-bright: #eee8d5;
  --accent: #cb4b16;
  --accent-dim: #dc322f;
  --green: #859900;
  --red: #dc322f;
  --yellow: #b58900;
  --blue: #268bd2;
  --cyan: #2aa198;
  --border: #073642;
  --row-hover: #073642;
}
/* Solarized Light */
[data-theme="solarized-light"] {
  --bg: #fdf6e3;
  --bg-alt: #eee8d5;
  --fg: #657b83;
  --fg-dim: #93a1a1;
  --fg-bright: #073642;
  --accent: #cb4b16;
  --accent-dim: #dc322f;
  --green: #859900;
  --red: #dc322f;
  --yellow: #b58900;
  --blue: #268bd2;
  --cyan: #2aa198;
  --border: #eee8d5;
  --row-hover: #eee8d5;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Berkeley Mono", "IBM Plex Mono", "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
  font-size: 12px;
  line-height: 1.5;
  color: var(--fg);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; color: var(--fg-bright); }
.container { max-width: 1200px; margin: 0 auto; padding: 0 12px; }
.wide { max-width: 1600px; }

/* Top bar */
.topbar {
  background: var(--bg-alt);
  border-bottom: 1px solid var(--border);
  padding: 6px 0;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar .container {
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
}
.topbar .brand {
  color: var(--accent);
  font-weight: bold;
  font-size: 14px;
  letter-spacing: 1px;
}
.topbar nav { display: flex; gap: 4px; flex-wrap: wrap; }
.topbar nav a {
  color: var(--fg-dim);
  padding: 2px 8px;
  border-radius: 2px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.topbar nav a:hover { color: var(--fg-bright); background: var(--border); text-decoration: none; }
.topbar nav a.active { color: var(--accent); background: var(--border); }

/* Breadcrumb */
.breadcrumb {
  padding: 8px 0;
  font-size: 11px;
  color: var(--fg-dim);
  border-bottom: 1px solid var(--border);
}
.breadcrumb a { color: var(--fg-dim); }
.breadcrumb a:hover { color: var(--accent); }
.breadcrumb .sep { margin: 0 4px; }

/* Page header */
.page-header {
  padding: 16px 0 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.page-header h1 {
  font-size: 18px;
  font-weight: bold;
  color: var(--fg-bright);
  letter-spacing: 0.5px;
}
.page-header .subtitle {
  font-size: 11px;
  color: var(--fg-dim);
  margin-top: 2px;
}

/* Section headers */
h2 {
  font-size: 13px;
  font-weight: bold;
  color: var(--fg-bright);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 8px 0 6px;
  border-bottom: 1px solid var(--border);
  margin: 16px 0 8px;
}
h3 {
  font-size: 12px;
  font-weight: bold;
  color: var(--fg);
  padding: 4px 0;
}

/* Tables — the core of the Bloomberg look */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
  margin-bottom: 16px;
}
thead th {
  text-align: left;
  padding: 4px 8px;
  font-weight: bold;
  color: var(--fg-dim);
  text-transform: uppercase;
  font-size: 10px;
  letter-spacing: 0.5px;
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
  position: sticky;
  top: 32px;
  background: var(--bg);
}
thead th.num { text-align: right; }
tbody td {
  padding: 3px 8px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
tbody tr:hover { background: var(--row-hover); }

/* Rank column */
td.rank {
  color: var(--fg-dim);
  text-align: right;
  padding-right: 12px;
  width: 30px;
}

/* Win/Loss/Draw coloring */
.w { color: var(--green); }
.l { color: var(--red); }
.t { color: var(--yellow); }
.record { font-weight: bold; }

/* Score display */
.score-win { color: var(--fg-bright); font-weight: bold; }
.score-loss { color: var(--fg-dim); }
.score-tie { color: var(--yellow); font-weight: bold; }

/* Stat highlights */
.stat-good { color: var(--green); }
.stat-bad { color: var(--red); }
.stat-neutral { color: var(--fg); }
.stat-elite { color: var(--yellow); font-weight: bold; }

/* Change indicators */
.change-up { color: var(--green); }
.change-down { color: var(--red); }
.change-none { color: var(--fg-dim); }

/* Badges / tags */
.tag {
  display: inline-block;
  padding: 0 4px;
  font-size: 10px;
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--fg-dim);
}
.tag-conf { border-color: var(--blue); color: var(--blue); }
.tag-rivalry { border-color: var(--red); color: var(--red); }
.tag-playoff { border-color: var(--yellow); color: var(--yellow); }
.tag-pos { border-color: var(--cyan); color: var(--cyan); }

/* Grid layouts */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; }

/* Metric box */
.metric {
  padding: 8px;
  border: 1px solid var(--border);
  background: var(--bg-alt);
}
.metric .label {
  font-size: 10px;
  color: var(--fg-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.metric .value {
  font-size: 16px;
  font-weight: bold;
  color: var(--fg-bright);
}
.metric .value.accent { color: var(--accent); }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
.tabs a {
  padding: 6px 12px;
  color: var(--fg-dim);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 2px solid transparent;
}
.tabs a:hover { color: var(--fg-bright); text-decoration: none; }
.tabs a.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Box score specific */
.box-score-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 0;
  border-bottom: 2px solid var(--border);
  margin-bottom: 16px;
}
.box-team {
  text-align: center;
  flex: 1;
}
.box-team .name { font-size: 14px; font-weight: bold; color: var(--fg-bright); }
.box-team .record { font-size: 11px; color: var(--fg-dim); }
.box-score-vs {
  font-size: 11px;
  color: var(--fg-dim);
  padding: 0 16px;
}
.box-score-final {
  font-size: 24px;
  font-weight: bold;
  font-variant-numeric: tabular-nums;
}

/* Empty state */
.empty {
  padding: 40px;
  text-align: center;
  color: var(--fg-dim);
  font-style: italic;
}
.notice {
  padding: 20px;
  text-align: center;
  color: var(--fg-dim);
  border: 1px solid var(--border);
  background: var(--bg-alt);
  margin: 16px 0;
}

/* Metric cards */
.metric-card {
  background: var(--bg-alt);
  border: 1px solid var(--border);
  padding: 12px;
}
.metric-card .metric-label { font-size: 11px; color: var(--fg-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.metric-card .metric-value { font-size: 16px; font-weight: bold; color: var(--fg-bright); margin: 4px 0; }
.metric-card .metric-detail { font-size: 10px; color: var(--fg-dim); }

/* Footer */
.footer {
  margin-top: 32px;
  padding: 12px 0;
  border-top: 1px solid var(--border);
  font-size: 10px;
  color: var(--fg-dim);
  text-align: center;
}

/* Responsive */
@media (max-width: 1024px) {
  .grid-4 { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 768px) {
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  table { font-size: 10px; }
  thead th, tbody td { padding: 2px 4px; }
  thead th { position: static; }
  .topbar nav a { font-size: 10px; padding: 2px 4px; }
  .box-score-header { flex-direction: column; gap: 8px; }
  .box-team .name { font-size: 12px; }
  .box-score-final { font-size: 18px; }
  .box-score-vs { padding: 4px 0; }
  .metric .value { font-size: 14px; }
  /* Tabs: horizontal scroll instead of wrap to prevent overlap */
  .tabs { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tabs a { padding: 4px 8px; font-size: 10px; white-space: nowrap; flex-shrink: 0; }
  /* Make all tables horizontally scrollable on mobile */
  table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }
  .page-header h1 { font-size: 14px; }
  .container { padding: 0 8px; }
  body { font-size: 11px; }
  .theme-btn { font-size: 9px; padding: 2px 6px; }
  .theme-menu { right: 0; left: auto; }
}
/* Horizontal scroll wrapper for wide tables on small screens */
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

/* Theme switcher */
.theme-switcher {
  margin-left: auto;
  position: relative;
}
.theme-btn {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--fg-dim);
  font-family: inherit;
  font-size: 10px;
  padding: 2px 8px;
  cursor: pointer;
  border-radius: 2px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.theme-btn:hover { color: var(--fg-bright); border-color: var(--fg-dim); }
.theme-menu {
  display: none;
  position: absolute;
  right: 0;
  top: 100%;
  margin-top: 4px;
  background: var(--bg-alt);
  border: 1px solid var(--border);
  min-width: 150px;
  z-index: 200;
}
.theme-menu.open { display: block; }
.theme-menu button {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  color: var(--fg);
  font-family: inherit;
  font-size: 11px;
  padding: 6px 10px;
  cursor: pointer;
}
.theme-menu button:hover { background: var(--row-hover); color: var(--fg-bright); }
.theme-menu button.active { color: var(--accent); }
.theme-swatch {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 1px;
  margin-right: 6px;
  vertical-align: middle;
}
</style>
<script>
(function(){
  var saved = localStorage.getItem('vb-theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
})();
</script>
</head>
<body>
<div class="topbar">
  <div class="container wide">
    <a class="brand" href="/stats/">VIPERBALL</a>
    <nav>
      <a href="/stats/" {% if section == 'home' %}class="active"{% endif %}>Home</a>
      <a href="/stats/college/" {% if section == 'college' %}class="active"{% endif %}>College</a>
      <a href="/stats/pro/" {% if section == 'pro' %}class="active"{% endif %}>Pro</a>
      <a href="/stats/wvl/" {% if section == 'wvl' %}class="active"{% endif %}>WVL</a>
      <a href="/stats/international/" {% if section == 'international' %}class="active"{% endif %}>International</a>
      <a href="/stats/recruiting/" {% if section == 'recruiting' %}class="active"{% endif %}>Recruiting</a>
      <a href="/stats/archives/" {% if section == 'archives' %}class="active"{% endif %}>Archives</a>
      <a href="/stats/search" {% if section == 'search' %}class="active"{% endif %}>Search</a>
    </nav>
    <div class="theme-switcher">
      <button class="theme-btn" onclick="document.querySelector('.theme-menu').classList.toggle('open')" aria-label="Change theme">Theme</button>
      <div class="theme-menu" id="theme-menu">
        <button data-theme="bloomberg"><span class="theme-swatch" style="background:#ff6600"></span>Bloomberg</button>
        <button data-theme="light"><span class="theme-swatch" style="background:#b45309"></span>Light</button>
        <button data-theme="ocean"><span class="theme-swatch" style="background:#d26937"></span>Ocean Dark</button>
        <button data-theme="ocean-light"><span class="theme-swatch" style="background:#d26937"></span>Ocean Light</button>
        <button data-theme="solarized"><span class="theme-swatch" style="background:#cb4b16"></span>Solarized Dark</button>
        <button data-theme="solarized-light"><span class="theme-swatch" style="background:#cb4b16"></span>Solarized Light</button>
        <button data-theme="amber"><span class="theme-swatch" style="background:#ffbf00"></span>Amber CRT</button>
      </div>
    </div>
  </div>
</div>

{% block breadcrumb %}{% endblock %}

<div class="container wide">
{% block content %}{% endblock %}
</div>

<div class="container">
  <div class="footer">
    VIPERBALL STATS &middot; Data refreshes with each simulation
  </div>
</div>
<script>
(function(){
  var menu = document.getElementById('theme-menu');
  var current = document.documentElement.getAttribute('data-theme') || 'bloomberg';
  // Mark active theme
  menu.querySelectorAll('button').forEach(function(btn){
    if (btn.getAttribute('data-theme') === current) btn.classList.add('active');
    btn.addEventListener('click', function(){
      var theme = this.getAttribute('data-theme');
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('vb-theme', theme);
      menu.querySelectorAll('button').forEach(function(b){ b.classList.remove('active'); });
      this.classList.add('active');
      menu.classList.remove('open');
    });
  });
  // Close menu on outside click
  document.addEventListener('click', function(e){
    if (!e.target.closest('.theme-switcher')) menu.classList.remove('open');
  });
})();
</script>
</body>
</html>
