# fly.toml app configuration file for viperball
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'viperball'
primary_region = 'ams'

[build]
  dockerfile = "Dockerfile"

[deploy]
  strategy = "rolling"

[env]
  # Saves DB now lives on a persistent volume (see [mounts]) so deploys and
  # restarts keep every experiment. On the volume's very first boot the file
  # is missing, so the app still seeds it once from the hub snapshot
  # (see api/main.py _restore_db_from_hub); thereafter the volume wins.
  RESTORE_DB_URL = 'https://vroomtv.fly.dev/download/viperball'
  VIPERBALL_DB_PATH = '/data/viperball.db'

# Persistent volume for the saves DB. `fly deploy` auto-creates it on first
# deploy for the running machine; size grows as experiments accumulate.
[mounts]
  source = 'viperball_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  # Off until manually booted: Fly stops the machine when idle and does NOT
  # auto-start it on incoming requests, so it stays off (no charges) until
  # you explicitly start it with `fly machine start --app viperball` (or
  # `fly scale count 1`). While stopped, visiting the URL will NOT wake the
  # machine — the request fails until you boot it. This trades convenience
  # for full control over when the VM (and its cost) is running.
  auto_stop_machines = 'stop'
  auto_start_machines = false
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = "connections"
    hard_limit = 60
    soft_limit = 40

# Service-level health check: controls whether traffic is routed to this machine.
# Uses [[http_service.checks]] (not top-level [checks] which blocks deployments on failure).
# Grace period gives NiceGUI time to initialize socket.io routes and load team data.
[[http_service.checks]]
  grace_period = "120s"
  interval = "30s"
  method = "GET"
  timeout = "30s"
  path = "/api/health"

[[vm]]
  size = "performance-2x"
  memory = "4gb"
