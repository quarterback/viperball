# fly.toml app configuration file for viperball
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'viperball'
primary_region = 'ams'

[build]
  dockerfile = "Dockerfile"

[deploy]
  strategy = "rolling"

[env]
  # This app has no volume; deploys wipe the saves DB. On boot the app
  # restores it from the hub's latest snapshot (see api/main.py),
  # authenticating with the EXPORT_TOKEN secret it already has.
  RESTORE_DB_URL = 'https://vroomtv.fly.dev/download/viperball'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = "connections"
    hard_limit = 60
    soft_limit = 40

# Service-level health check: controls whether traffic is routed to this machine.
# Uses [[http_service.checks]] (not top-level [checks] which blocks deployments on failure).
# Grace period gives NiceGUI time to initialize socket.io routes and load team data.
[[http_service.checks]]
  grace_period = "120s"
  interval = "30s"
  method = "GET"
  timeout = "30s"
  path = "/api/health"

[[vm]]
  size = "performance-2x"
  memory = "4gb"
